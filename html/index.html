<!DOCTYPE html>

<head>

    <title>Home</title>

    <style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    a {
        text-decoration: none;
    }

    .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 100px;

    padding-right: 30px;
    }

    .nav {

        gap: 50px;
    }

        color: white;

    }

    .colocar a esquerda, .colocar a direita {

        width: 48%;

        padding-right: 30px;
    }

    }


    .container2 {

    flex-direction: row;          /* Garante que fiquem em linha */
    padding-left: 30px;
    }
    .container2 h1 {
        font-size: 80px;
    }



    </style>




</head>

da tecnologia com Dev</h1><hr>

disponíveis.</h2>

</body>
